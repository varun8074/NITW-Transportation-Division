<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Transportation Division</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
  </head>
  <style>
    .content {
      background-color: rgba(243, 200, 143, 0.164);
      padding: 3%;
    }
  </style>

  <body>
    <div id="header"></div>
    <div class="content">
      <img
        src="images/nitw transportation.png"
        class="rounded mx-auto d-block"
        height="400px"
        width="800px"
        alt="..."
      />
      <div class="d-flex justify-content-center">
        <div id="menu"></div>

        <div class="tab-content" id="v-pills-tabContent">
          <div
            class="tab-pane fade show active"
            id="v-pills-home"
            role="tabpanel"
            aria-labelledby="v-pills-home-tab"
            tabindex="0"
          >
            <div id="home"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-AcademicPrograms"
            role="tabpanel"
            aria-labelledby="v-pills-AcademicPrograms-tab"
            tabindex="0"
          >
            <div id="AcademicPrograms"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-people"
            role="tabpanel"
            aria-labelledby="v-pills-people-tab"
            tabindex="0"
          >
            <div id="people"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-ResearchAndConsultancy"
            role="tabpanel"
            aria-labelledby="v-pills-ResearchAndConsultancy-tab"
            tabindex="0"
          >
            <div id="ResearchAndConsultancy"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-Collaborations"
            role="tabpanel"
            aria-labelledby="v-pills-Collaborations-tab"
            tabindex="0"
          >
            <div id="Collaborations"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-CapacityBuildingAndKnowledgeTransfer"
            role="tabpanel"
            aria-labelledby="v-pills-CapacityBuildingAndKnowledgeTransfer-tab"
            tabindex="0"
          >
            <div id="CapacityBuildingAndKnowledgeTransfer"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-Publications"
            role="tabpanel"
            aria-labelledby="v-pills-Publications-tab"
            tabindex="0"
          >
            <div id="Publications"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-Facilities"
            role="tabpanel"
            aria-labelledby="v-pills-Facilities-tab"
            tabindex="0"
          >
            <div id="Facilities"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-Students"
            role="tabpanel"
            aria-labelledby="v-pills-Students-tab"
            tabindex="0"
          >
            <div id="Students"></div>
          </div>
          <div
            class="tab-pane fade"
            id="v-pills-UsefulLinks"
            role="tabpanel"
            aria-labelledby="v-pills-UsefulLinks-tab"
            tabindex="0"
          >
            <div id="UsefulLinks"></div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
      crossorigin="anonymous"
    ></script>
    <!-- SheetJS -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <!-- DataTables -->
<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


    <script>
      $(document).ready(function () {
        // Load header with sticky logic
        $("#header").load("helper\\header.html", function () {
          var navbar = $(".rd-navbar-static");
          var navbarOffset = navbar.offset().top;

          $(window).on("scroll", function () {
            if ($(window).scrollTop() >= navbarOffset) {
              navbar.addClass("rd-navbar--is-stuck");
            } else {
              navbar.removeClass("rd-navbar--is-stuck");
            }
          });
        });

        // List of sections and files
        const sections = {
          "#menu": "helper\\menu.html",
          "#home": "helper\\home.html",
          "#AcademicPrograms": "helper\\academic.html",
          "#people": "helper\\people.html",
          "#ResearchAndConsultancy": "helper\\reacal.html",
          "#Collaborations": "helper\\collab.html",
          "#CapacityBuildingAndKnowledgeTransfer": "helper\\capacity.html",
          "#Publications": "helper\\publications.html",
          "#Facilities": "helper\\facilities.html",
          "#Students": "helper\\students.html",
          "#UsefulLinks": "helper\\usefullinks.html",
        };

        // Loop through and load each file
        $.each(sections, function (id, file) {
          $(id).load(file, function (response, status, xhr) {
            if (status === "error") {
              console.error(
                "Error loading",
                file,
                ":",
                xhr.status,
                xhr.statusText,
              );
            }
          });
        });
      });
    </script>
    
  </body>
</html>
