<!-- ================= MAIN TABS ================= -->
<ul
  class="nav nav-pills-rounded nav-justified mb-3"
  id="mainTabs"
  role="tablist"
  style="min-width: 1000px"
>
  <li class="nav-item pe-3">
    <button
      class="nav-link active"
      id="research-tab"
      data-bs-toggle="pill"
      data-bs-target="#researchPane"
      type="button"
    >
      Research
    </button>
  </li>

  <li class="nav-item pe-3">
    <button
      class="nav-link"
      id="consultancy-tab"
      data-bs-toggle="pill"
      data-bs-target="#consultancyPane"
      type="button"
    >
      Consultancy
    </button>
  </li>
</ul>

<div class="tab-content">
  <!-- ================= RESEARCH ================= -->
  <div class="tab-pane fade show active" id="researchPane">
    <!-- SUB TABS -->
    <ul class="nav nav-pills-rounded nav-justified mb-3" id="researchTabs">
      <li class="nav-item pe-3">
        <button
          class="nav-link active"
          data-bs-toggle="pill"
          data-bs-target="#ongoingResearchPane"
          type="button"
        >
          Ongoing Research
        </button>
      </li>

      <li class="nav-item pe-3">
        <button
          class="nav-link"
          data-bs-toggle="pill"
          data-bs-target="#completedResearchPane"
          type="button"
        >
          Completed Research
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- ================= ONGOING RESEARCH ================= -->
      <div class="tab-pane fade show active" id="ongoingResearchPane">
        <div class="card border-dark mb-3">
          <div class="card-body">
            <h5 class="text-info mb-3">Ongoing Research Projects</h5>

            <div id="orpOutput"></div>
          </div>
        </div>
      </div>

      <!-- ================= COMPLETED RESEARCH ================= -->
      <div class="tab-pane fade" id="completedResearchPane">
        <div class="card border-dark mb-3">
          <div class="card-body">
            <h5 class="text-success mb-3">Completed Research Projects</h5>

            <div id="crpOutput"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ================= CONSULTANCY ================= -->
  <div class="tab-pane fade" id="consultancyPane">
    <!-- SUB TABS -->
    <ul class="nav nav-pills-rounded nav-justified mb-3" id="consultancyTabs">
      <li class="nav-item pe-3">
        <button
          class="nav-link active"
          data-bs-toggle="pill"
          data-bs-target="#ongoingConsultancyPane"
          type="button"
        >
          Ongoing Consultancy
        </button>
      </li>

      <li class="nav-item pe-3">
        <button
          class="nav-link"
          data-bs-toggle="pill"
          data-bs-target="#completedConsultancyPane"
          type="button"
        >
          Completed Consultancy
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- ================= ONGOING CONSULTANCY ================= -->
      <div class="tab-pane fade show active" id="ongoingConsultancyPane">
        <div class="card border-dark mb-3">
          <div class="card-body">
            <h5 class="text-info mb-3">Ongoing Consultancy Projects</h5>

            <div id="ocpOutput"></div>
          </div>
        </div>
      </div>

      <!-- ================= COMPLETED CONSULTANCY ================= -->
      <div class="tab-pane fade" id="completedConsultancyPane">
        <div class="card border-dark mb-3">
          <div class="card-body">
            <h5 class="text-success mb-3">Completed Consultancy Projects</h5>

            <div id="ccpOutput"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {
    // =====================================================
    // TABLE STATE
    // =====================================================

    const tableState = {
      // ONGOING RESEARCH
      ORP: {
        currentPage: 1,
        rowsPerPage: 5,
        fullData: [],
        filteredData: [],
        output: "#orpOutput",
        type: "ongoingResearch",
      },

      // COMPLETED RESEARCH
      CRP: {
        currentPage: 1,
        rowsPerPage: 5,
        fullData: [],
        filteredData: [],
        output: "#crpOutput",
        type: "completedResearch",
      },

      // ONGOING CONSULTANCY
      OCP: {
        currentPage: 1,
        rowsPerPage: 5,
        fullData: [],
        filteredData: [],
        output: "#ocpOutput",
        type: "ongoingConsultancy",
      },

      // COMPLETED CONSULTANCY
      CCP: {
        currentPage: 1,
        rowsPerPage: 5,
        fullData: [],
        filteredData: [],
        output: "#ccpOutput",
        type: "completedConsultancy",
      },
    };

    // =====================================================
    // LOAD RESEARCH FILES
    // =====================================================

    loadExcel("excels/Research.xlsx", "Research_ongoing", "ORP");

    loadExcel("excels/Research.xlsx", "Research_completed", "CRP");

    // =====================================================
    // LOAD CONSULTANCY FILES
    // =====================================================

    $('button[data-bs-target="#consultancyPane"]').one(
      "shown.bs.tab",
      function () {
        loadExcel("excels/Consultancy.xlsx", "Ongoing Consultancy", "OCP");

        loadExcel("excels/Consultancy.xlsx", "Completed Consultancy", "CCP");
      },
    );

    // =====================================================
    // LOAD EXCEL FUNCTION
    // =====================================================

    function loadExcel(fileUrl, sheetName, mode) {
      fetch(fileUrl)
        .then((res) => {
          if (!res.ok) {
            throw new Error(`Failed to load "${fileUrl}" (HTTP ${res.status})`);
          }

          return res.arrayBuffer();
        })

        .then((data) => {
          let workbook;

          try {
            workbook = XLSX.read(data, {
              type: "array",
            });
          } catch (error) {
            throw new Error("Invalid or corrupted Excel file.");
          }

          const sheet = workbook.Sheets[sheetName];

          // ==========================
          // SHEET NOT FOUND
          // ==========================

          if (!sheet) {
            throw new Error(`Sheet "${sheetName}" not found.`);
          }

          let excelData = XLSX.utils.sheet_to_json(sheet, {
            defval: "",
          });

          // ==========================
          // CLEAN COLUMN NAMES
          // ==========================

          excelData = excelData.map((row) => {
            const newRow = {};

            Object.keys(row).forEach((key) => {
              newRow[key.trim()] = row[key];
            });

            return newRow;
          });

          // ==========================
          // EMPTY SHEET
          // ==========================

          if (excelData.length === 0) {
            throw new Error(`No records found in "${sheetName}".`);
          }

          // ==========================
          // COLUMN VALIDATION
          // ==========================

          const columnRules = {
            ongoingResearch: ["Project_Title", "Research_Domain"],

            completedResearch: ["Sponsored By"],

            ongoingConsultancy: ["Consultancy_ID", "Client_Name"],

            completedConsultancy: ["Sponsored By"],
          };

          const requiredColumns = columnRules[tableState[mode].type] || [];

          const missingColumns = requiredColumns.filter(
            (col) => !(col in excelData[0]),
          );

          if (missingColumns.length > 0) {
            throw new Error(
              `Missing required columns: ${missingColumns.join(", ")}`,
            );
          }

          // ==========================
          // SAVE DATA
          // ==========================

          tableState[mode].fullData = excelData;

          tableState[mode].filteredData = [...excelData];

          tableState[mode].currentPage = 1;

          renderLayout(mode);

          renderTable(mode);
        })

        .catch((error) => {
          console.error(`Error loading ${sheetName}:`, error);

          $(tableState[mode].output).html(`
        <div class="alert alert-danger">
          <strong>Error:</strong>
          ${error.message}
        </div>
      `);
        });
    }

    // =====================================================
    // RENDER LAYOUT
    // =====================================================

    function renderLayout(mode) {
      let html = `

        <input
          type="text"
          id="search${mode}"
          class="form-control mb-3"
          placeholder="Search..."
        >

        <div id="content${mode}"></div>

        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">

          <div id="info${mode}"></div>

          <div id="pagination${mode}"></div>

        </div>
      `;

      $(tableState[mode].output).html(html);
    }

    // =====================================================
    // SEARCH
    // =====================================================

    $(document).on("keyup", "[id^=search]", function () {
      const mode = this.id.replace("search", "");

      const value = $(this).val().toLowerCase();

      tableState[mode].filteredData = tableState[mode].fullData.filter((row) =>
        Object.values(row).some((v) => String(v).toLowerCase().includes(value)),
      );

      tableState[mode].currentPage = 1;

      renderTable(mode);
    });

    // =====================================================
    // RENDER TABLE
    // =====================================================

    function renderTable(mode) {
      const state = tableState[mode];

      const start = (state.currentPage - 1) * state.rowsPerPage;

      const end = start + state.rowsPerPage;

      const pageData = state.filteredData.slice(start, end);

      let html = `
        <div class="table-responsive">

          <table class="table table-bordered table-hover">

            <thead class="table-dark text-center">

              <tr>
      `;

      // =====================================================
      // ONGOING RESEARCH HEADERS
      // =====================================================

      if (state.type === "ongoingResearch") {
        html += `
          <th>Project Title</th>
          <th>Research Domain</th>
          <th>Technology Used</th>
          <th>Start Date</th>
          <th>Status</th>
          <th>Completion %</th>
          <th>Team Size</th>
          <th>Funding Amount (USD)</th>
        `;
      }

      // =====================================================
      // COMPLETED RESEARCH HEADERS
      // =====================================================
      else if (state.type === "completedResearch") {
        html += `
          <th>S.No</th>
          <th>Project Title – Broad Area</th>
          <th>Sponsored By</th>
          <th>Year of Study</th>
          <th>Amount (Rs. Lakhs)</th>
        `;
      }

      // =====================================================
      // ONGOING CONSULTANCY HEADERS
      // =====================================================
      else if (state.type === "ongoingConsultancy") {
        html += `
          <th>Consultancy ID</th>
          <th>Client Name</th>
          <th>Project Title</th>
          <th>Consultancy Area</th>
          <th>Start Date</th>
          <th>Status</th>
          <th>Consultant Team</th>
          <th>Project Value</th>
        `;
      }

      // =====================================================
      // COMPLETED CONSULTANCY HEADERS
      // =====================================================
      else {
        html += `
          <th>S.No</th>
          <th>Project Title - Broad Area</th>
          <th>Sponsored By</th>
        `;
      }

      html += `
              </tr>

            </thead>

            <tbody>
      `;

      // =====================================================
      // NO DATA
      // =====================================================

      if (pageData.length === 0) {
        html += `
          <tr>

            <td colspan="10"
                class="text-center">

              No records found

            </td>

          </tr>
        `;
      }

      // =====================================================
      // TABLE ROWS
      // =====================================================
      else {
        pageData.forEach((row, index) => {
          html += `<tr>`;

          // =====================================================
          // ONGOING RESEARCH DATA
          // =====================================================

          if (state.type === "ongoingResearch") {
            html += `
            

              <td>
                ${row["Project_Title"] || "-"}
              </td>

              <td>
                ${row["Research_Domain"] || "-"}
              </td>

              <td>
                ${row["Technology_Used"] || "-"}
              </td>

              <td class="text-center">
                ${row["Start_Date"] || "-"}
              </td>

              <td class="text-center">
                ${row["Current_Status"] || "-"}
              </td>

              <td class="text-center">
                ${row["Completion_Percentage"] || "-"}%
              </td>

              <td class="text-center">
                ${row["Team_Size"] || "-"}
              </td>

              <td class="text-end">
                ${row["Funding_Amount_USD"] || "-"}
              </td>
            `;
          }

          // =====================================================
          // COMPLETED RESEARCH DATA
          // =====================================================
          else if (state.type === "completedResearch") {
            html += `
              <td class="text-center">
                ${start + index + 1}
              </td>

              <td>
                ${
                  row["Project Title – Broad Area"] ||
                  row["Project Title-Broad Area"] ||
                  "-"
                }
              </td>

              <td>
                ${row["Sponsored By"] || "-"}
              </td>

              <td class="text-center">
                ${row["Year of Study"] || "-"}
              </td>

              <td class="text-end">
                ${row["Amount (Rs. Lakhs)"] || "-"}
              </td>
            `;
          }

          // =====================================================
          // ONGOING CONSULTANCY DATA
          // =====================================================
          else if (state.type === "ongoingConsultancy") {
            html += `
              <td>
                ${row["Consultancy_ID"] || "-"}
              </td>

              <td>
                ${row["Client_Name"] || "-"}
              </td>

              <td>
                ${row["Project_Title"] || "-"}
              </td>

              <td>
                ${row["Consultancy_Area"] || "-"}
              </td>

              <td class="text-center">
                ${row["Start_Date"] || "-"}
              </td>

              <td class="text-center">
                ${row["Status"] || "-"}
              </td>

              <td class="text-center">
                ${row["Consultant_Team_Size"] || "-"}
              </td>

              <td class="text-end">
                ${row["Project_Value_USD"] || "-"}
              </td>
            `;
          }

          // =====================================================
          // COMPLETED CONSULTANCY DATA
          // =====================================================
          else {
            html += `
              <td class="text-center">
                ${row["S.No"] || "-"}
              </td>

              <td>
                ${row["Project Title-Broad Area"] || "-"}
              </td>

              <td>
                ${row["Sponsored By"] || "-"}
              </td>
            `;
          }

          html += `</tr>`;
        });
      }

      html += `
            </tbody>

          </table>

        </div>
      `;

      $("#content" + mode).html(html);

      renderPagination(mode);
    }

    // =====================================================
    // PAGINATION
    // =====================================================

    function renderPagination(mode) {
      const state = tableState[mode];

      const totalPages = Math.ceil(
        state.filteredData.length / state.rowsPerPage,
      );

      let controls = "";

      // =====================================================
      // PREV BUTTON
      // =====================================================

      controls += `
        <button
          class="btn btn-sm btn-secondary me-1 page-btn"
          data-mode="${mode}"
          data-page="${state.currentPage - 1}"
          ${state.currentPage === 1 ? "disabled" : ""}>

          Prev

        </button>
      `;

      // =====================================================
      // PAGE BUTTONS
      // =====================================================

      for (let i = 1; i <= totalPages; i++) {
        controls += `
          <button
            class="btn btn-sm me-1 mb-1 page-btn
            ${i === state.currentPage ? "btn-primary" : "btn-outline-primary"}"

            data-mode="${mode}"
            data-page="${i}">

            ${i}

          </button>
        `;
      }

      // =====================================================
      // NEXT BUTTON
      // =====================================================

      controls += `
        <button
          class="btn btn-sm btn-secondary page-btn"
          data-mode="${mode}"
          data-page="${state.currentPage + 1}"
          ${state.currentPage === totalPages ? "disabled" : ""}>

          Next

        </button>
      `;

      $("#pagination" + mode).html(controls);

      // =====================================================
      // TABLE INFO
      // =====================================================

      $("#info" + mode).html(`

        Showing

        ${
          state.filteredData.length === 0
            ? 0
            : (state.currentPage - 1) * state.rowsPerPage + 1
        }

        to

        ${Math.min(
          state.currentPage * state.rowsPerPage,

          state.filteredData.length,
        )}

        of

        ${state.filteredData.length}

        entries
      `);
    }

    // =====================================================
    // PAGINATION CLICK
    // =====================================================

    $(document).on("click", ".page-btn", function () {
      const mode = $(this).data("mode");

      const page = Number($(this).data("page"));

      const state = tableState[mode];

      const totalPages = Math.ceil(
        state.filteredData.length / state.rowsPerPage,
      );

      if (page < 1 || page > totalPages) return;

      state.currentPage = page;

      renderTable(mode);
    });
  });
</script>
