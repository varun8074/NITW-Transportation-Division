<style>
  .nav-link {
    background-color: #00b6e2;
    color: rgb(0, 0, 0);
    position: relative;
  }

  .nav-link.active {
    background-color: #c20315 !important;
    color: white !important;
    position: relative;
  }

  .accordion-item {
    min-width: 900px;
  }

  .figure-caption {
    font-size: 20px;
    font-weight: 600;
  }

  .lab-section {
    margin-bottom: 20px;
  }

  .lab-section h5 {
    color: #c20315;
    margin-top: 15px;
  }

  ul {
    padding-left: 20px;
  }
  .custom-table {
    border: 2px solid #c20315;
  }

  .custom-table th,
  .custom-table td {
    border: 2px solid #c20315 !important;
  }

  .custom-table th {
    background-color: #c1eaf7 !important;
    color: #000;
    vertical-align: middle;
  }
  .custom-table td {
    background-color: #d4f2f7 !important;
    color: #000;
    vertical-align: middle;
  }
</style>

<ul
  class="nav nav-pills-rounded nav-justified mb-3"
  id="pills-tab"
  role="tablist"
  style="min-width: 1000px"
>
  <li class="nav-item pe-3" role="presentation">
    <button
      class="nav-link active"
      id="pills-laboratories-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-laboratories"
      type="button"
      role="tab"
    >
      Laboratories
    </button>
  </li>

  <li class="nav-item pe-3" role="presentation">
    <button
      class="nav-link"
      id="pills-division_library-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-division_library"
      type="button"
      role="tab"
    >
      Division Library
    </button>
  </li>
</ul>

<div class="tab-content" id="pills-tabContent">
  <!-- LAB TAB -->
  <div
    class="tab-pane fade show active"
    id="pills-laboratories"
    role="tabpanel"
  >
    <div class="accordion" id="labsAccordion">
      <!-- Dynamic data comes here -->
    </div>
  </div>

  <!-- LIBRARY TAB -->
  <div class="tab-pane fade" id="pills-division_library" role="tabpanel">
    <ul class="nav nav-pills-rounded nav-justified mb-3" id="LibraryTabs">
      <li class="nav-item pe-3">
        <button
          class="nav-link active"
          data-bs-toggle="pill"
          data-bs-target="#JournalsPane"
        >
          Journals
        </button>
      </li>

      <li class="nav-item pe-3">
        <button
          class="nav-link"
          data-bs-toggle="pill"
          data-bs-target="#NewslettersPane"
        >
          Newsletters
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- ================= Journals ================= -->
      <div class="tab-pane fade show active" id="JournalsPane">
        <div class="card border-dark mb-3">
          <div class="card-body">
            <h5 class="text-info mb-3">Journals</h5>

            <div id="JOutput"></div>
          </div>
        </div>
      </div>

      <!-- ================= Newsletters================= -->
      <div class="tab-pane fade" id="NewslettersPane">
        <div class="card border-dark mb-3">
          <div class="card-body">
            <h5 class="text-success mb-3">Newsletters</h5>

            <div id="NOutput"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {
    // =========================
    // LABORATORIES
    // =========================
    fetch("excels/LabDetails.xlsx")
      .then((response) => response.arrayBuffer())
      .then((arrayBuffer) => {
        const workbook = XLSX.read(arrayBuffer, { type: "array" });

        const accordion = $("#labsAccordion");

        workbook.SheetNames.forEach((sheetName, index) => {
          const worksheet = workbook.Sheets[sheetName];

          const data = XLSX.utils.sheet_to_json(worksheet, {
            defval: "",
          });

          let faculty = "";
          let softwareList = [];
          let hardwareList = [];
          let instructionsList = [];

          data.forEach((row) => {
            if (row["Faculty Incharge"]) {
              faculty = row["Faculty Incharge"];
            }

            if (row["Software"]) {
              softwareList.push(row["Software"]);
            }

            if (row["Hardware"]) {
              hardwareList.push(row["Hardware"]);
            }

            if (row["Instructions"]) {
              instructionsList.push(row["Instructions"]);
            }
          });

          const collapseId = `collapse${index}`;

          const accordionHTML = `
            <div class="accordion-item" style="background-color:#fff9ee; border:2px solid #c20315;">

              <h2 class="accordion-header text-center">

                <figure class="figure mx-auto mt-3">
                  <img
                    src="images/labs/${sheetName}.jpg"
                    class="figure-img img-fluid rounded"
                    alt="${sheetName} Lab"
                    style="max-height:50%; max-width:50%;"
                  />

                  <figcaption class="figure-caption text-danger">
                    ${sheetName} Laboratory
                  </figcaption>
                </figure>

                <button
                  class="accordion-button ${index !== 0 ? "collapsed" : ""}"
                  type="button"
                  data-bs-toggle="collapse"
                  data-bs-target="#${collapseId}"
                >
                  Laboratories Information
                </button>
              </h2>

              <div
                id="${collapseId}"
                class="accordion-collapse collapse ${index === 0 ? "show" : ""}"
                data-bs-parent="#labsAccordion"
              >
                <div class="accordion-body">

                  <table class="table custom-table align-middle">
                    <tbody>

                      <tr>
                        <th width="25%">Faculty Incharge</th>
                        <td>${faculty}</td>
                      </tr>

                      <tr>
                        <th>Software Available</th>
                        <td>
                          <ul class="mb-0">
                            ${softwareList.map((item) => `<li>${item}</li>`).join("")}
                          </ul>
                        </td>
                      </tr>

                      <tr>
                        <th>Hardware Available</th>
                        <td>
                          <ul class="mb-0">
                            ${hardwareList.map((item) => `<li>${item}</li>`).join("")}
                          </ul>
                        </td>
                      </tr>

                      <tr>
                        <th>Instructions</th>
                        <td>
                          <ul class="mb-0">
                            ${instructionsList.map((item) => `<li>${item}</li>`).join("")}
                          </ul>
                        </td>
                      </tr>

                    </tbody>
                  </table>

                </div>
              </div>
            </div>

            <br>
          `;

          accordion.append(accordionHTML);
        });
      })
      .catch((error) => {
        console.error("Error loading LabDetails.xlsx:", error);
      });

    // =========================
    // DIVISION LIBRARY
    // =========================
    function createTableWithPagination(data, columns, outputId, prefix) {
      let currentPage = 1;
      let rowsPerPage = 10;
      let filteredData = [...data];
      let searchText = "";

      function renderTable() {
        const start = (currentPage - 1) * rowsPerPage;
        const end = start + rowsPerPage;
        const pageData = filteredData.slice(start, end);

        let html = `
            <div class="row mb-3">
                <div class="col-md-6">
                    <input
                        type="text"
                        class="form-control"
                        id="${prefix}Search"
                        placeholder="Search..."
                        value="${searchText}"
                    >
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-striped">
                    <thead class="table-dark">
                        <tr>
        `;

        columns.forEach((col) => {
          html += `<th>${col}</th>`;
        });

        html += `
                        </tr>
                    </thead>
                    <tbody>
        `;

        if (pageData.length === 0) {
          html += `
                <tr>
                    <td colspan="${columns.length}" class="text-center">
                        No Records Found
                    </td>
                </tr>
            `;
        } else {
          pageData.forEach((row, index) => {
            html += `<tr>`;

            columns.forEach((col) => {
              if (col === "S.No.") {
                html += `
                            <td>${start + index + 1}</td>
                        `;
              } else {
                html += `
                            <td>${row[col] || ""}</td>
                        `;
              }
            });

            html += `</tr>`;
          });
        }

        html += `
                    </tbody>
                </table>
            </div>

            <nav>
                <ul class="pagination justify-content-center" id="${prefix}Pagination">
                </ul>
            </nav>
        `;

        $(outputId).html(html);

        renderPagination();

        $(`#${prefix}Search`)
          .off("input")
          .on("input", function () {
            searchText = $(this).val().toLowerCase();

            filteredData = data.filter((row) =>
              Object.values(row).join(" ").toLowerCase().includes(searchText),
            );

            currentPage = 1;

            renderTable();

            const input = document.getElementById(`${prefix}Search`);

            input.focus();

            input.setSelectionRange(searchText.length, searchText.length);
          });
      }

      function renderPagination() {
        const totalPages = Math.ceil(filteredData.length / rowsPerPage) || 1;

        let paginationHTML = "";

        paginationHTML += `
            <li class="page-item ${currentPage === 1 ? "disabled" : ""}">
                <a class="page-link" href="#" data-page="${currentPage - 1}">
                    Previous
                </a>
            </li>
        `;

        for (let i = 1; i <= totalPages; i++) {
          paginationHTML += `
                <li class="page-item ${currentPage === i ? "active" : ""}">
                    <a class="page-link" href="#" data-page="${i}">
                        ${i}
                    </a>
                </li>
            `;
        }

        paginationHTML += `
            <li class="page-item ${currentPage === totalPages ? "disabled" : ""}">
                <a class="page-link" href="#" data-page="${currentPage + 1}">
                    Next
                </a>
            </li>
        `;

        $(`#${prefix}Pagination`).html(paginationHTML);

        $(`#${prefix}Pagination .page-link`)
          .off("click")
          .on("click", function (e) {
            e.preventDefault();

            const page = parseInt($(this).data("page"));

            if (page >= 1 && page <= totalPages) {
              currentPage = page;
              renderTable();
            }
          });
      }

      renderTable();
    }
    // ==========================================
    // DIVISION LIBRARY EXCEL
    // ==========================================
    fetch("excels/Division_Library.xlsx")
      .then((response) => response.arrayBuffer())
      .then((arrayBuffer) => {
        const workbook = XLSX.read(arrayBuffer, {
          type: "array",
        });

        // ======================================
        // JOURNALS
        // ======================================
        const journalSheet = workbook.Sheets["Journals"];

        if (journalSheet) {
          const journalData = XLSX.utils.sheet_to_json(journalSheet, {
            defval: "",
          });

          createTableWithPagination(
            journalData,
            ["S.No.", "Journal Name", "Frequency"],
            "#JOutput",
            "journal",
          );
        }

        // ======================================
        // NEWSLETTERS
        // ======================================
        const newsletterSheet = workbook.Sheets["Newsletters"];

        if (newsletterSheet) {
          const newsletterData = XLSX.utils.sheet_to_json(newsletterSheet, {
            defval: "",
          });

          createTableWithPagination(
            newsletterData,
            ["S.No.", "Newsletter", "Frequency"],
            "#NOutput",
            "newsletter",
          );
        }
      })
      .catch((error) => {
        console.error("Error loading Division_Library.xlsx:", error);
      });
  });
</script>
