<style>
  .image-container {
    position: relative;
    width: 150px;
    height: 175px;
    display: inline-block;
  }

  .image-container img {
    width: 100%;
    height: 100%;
    border: 3px solid #ffc107;
  }

  .hover-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.6);
    color: white;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: 0.3s;
    font-size: 14px;
    text-align: center;
  }

  .image-container:hover .hover-text {
    opacity: 1;
  }
</style>
<!-- ================= MAIN TABS ================= -->
<ul class="nav nav-pills-rounded nav-justified mb-3" style="min-width: 1000px">
  <li class="nav-item pe-3">
    <button
      class="nav-link active"
      data-bs-toggle="pill"
      data-bs-target="#faculty"
    >
      Faculty
    </button>
  </li>
  <li class="nav-item pe-3">
    <button class="nav-link" data-bs-toggle="pill" data-bs-target="#staff">
      Non-Teaching Staff
    </button>
  </li>
  <li class="nav-item pe-3">
    <button
      class="nav-link"
      data-bs-toggle="pill"
      data-bs-target="#previousfaculty"
    >
      Previous Faculty
    </button>
  </li>
</ul>

<div class="tab-content">
  <!-- ================= FACULTY ================= -->
  <div class="tab-pane fade show active" id="faculty">
    <!-- SUB TABS -->
    <ul
      class="nav nav-pills-rounded nav-justified mb-3"
      style="min-width: 500px"
    >
      <li class="nav-item pe-3">
        <button
          class="nav-link active"
          data-bs-toggle="pill"
          data-bs-target="#coreFaculty"
        >
          Core Faculty
        </button>
      </li>
      <li class="nav-item pe-3">
        <button
          class="nav-link"
          data-bs-toggle="pill"
          data-bs-target="#guestFaculty"
        >
          Guest Faculty
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- CORE -->
      <div class="tab-pane fade show active" id="coreFaculty">
        <div id="coreFacultyContainer"></div>
      </div>

      <!-- GUEST -->
      <div class="tab-pane fade" id="guestFaculty">
        <div id="guestFacultyContainer"></div>
      </div>
    </div>
  </div>

  <!-- ================= STAFF ================= -->
  <div class="tab-pane fade" id="staff">
    <div
      class="row row-cols-1 row-cols-md-3 g-4 text-center"
      id="staffContainer"
    ></div>
  </div>

  <!-- ================= PREVIOUS FACULTY ================= -->
  <div class="tab-pane fade" id="previousfaculty">
    <!-- SUB TABS -->
    <ul
      class="nav nav-pills-rounded nav-justified mb-3"
      style="min-width: 500px"
    >
      <li class="nav-item pe-3">
        <button
          class="nav-link active"
          data-bs-toggle="pill"
          data-bs-target="#previousFacultyTab"
        >
          Former Faculty Members
        </button>
      </li>

      <li class="nav-item pe-3">
        <button
          class="nav-link"
          data-bs-toggle="pill"
          data-bs-target="#previousHODTab"
        >
          Previous Division HODs
        </button>
      </li>
    </ul>

    <div class="tab-content">
      <!-- Previous Faculty -->
      <div class="tab-pane fade show active" id="previousFacultyTab">
        <div
          class="row row-cols-1 row-cols-md-4 g-4 text-center"
          id="previousFacultyContainer"
        ></div>
      </div>

      <!-- Previous HOD -->
      <div class="tab-pane fade" id="previousHODTab">
        <div
          class="row row-cols-1 row-cols-md-4 g-4 text-center"
          id="previousHODContainer"
        ></div>
      </div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {
    const DUMMY_IMAGE = "images/placeholder.jpg";

    function getImageWithFallback(imagePath) {
      return !imagePath || imagePath.toString().trim() === ""
        ? DUMMY_IMAGE
        : imagePath;
    }

    $.ajax({
      url: "excels/faculty.xlsx", // your Excel file path
      method: "GET",
      xhrFields: {
        responseType: "arraybuffer",
      },
      success: function (data) {
        const workbook = XLSX.read(data, { type: "array" });

        // ================= CORE FACULTY =================
        let coreData = XLSX.utils.sheet_to_json(workbook.Sheets["CoreFaculty"]);
        let coreHTML = "";

        $.each(coreData, function (i, f) {
          coreHTML += `
          <div class="card mb-3 p-3 bg-info bg-opacity-10 border border-info rounded">
            <div class="row g-0">
              <div class="col-md-4 text-center">
                <img src="${getImageWithFallback(f.Image)}" class="img-fluid border border-5 border-warning" width="150px" height="175px" onerror="this.src='images/placeholder.jpg'">
              </div>
              <div class="col-md-8">
                <h5>${f.Name}</h5>
                <h6 class="text-muted">${f.Designation}</h6>
                <p>📞 ${f.Mobile}</p>
                <p>✉ ${f.Mail}</p>
                <p>${f.Research}</p>
                <a href="${f.Profile || "#"}" target="_blank" class="btn btn-primary btn-sm">View Profile</a>
              </div>
            </div>
          </div>`;
        });

        $("#coreFacultyContainer").html(coreHTML);

        // ================= GUEST FACULTY =================
        let guestData = XLSX.utils.sheet_to_json(
          workbook.Sheets["GuestFaculty"] || {},
        );
        let guestHTML = "";

        $.each(guestData, function (i, f) {
          guestHTML += `
          <div class="card mb-3 p-3 bg-info bg-opacity-10 border border-info rounded">
            <div class="row g-0">
              <div class="col-md-4 text-center">
                <img src="${getImageWithFallback(f.Image)}" class="img-fluid border border-5 border-warning" width="150px" height="175px" onerror="this.src='images/placeholder.jpg'">
              </div>
              <div class="col-md-8">
                <h5>${f.Name}</h5>
                <h6 class="text-muted">${f.Designation}</h6>
                <p>📞 ${f.Mobile}</p>
                <p>✉ ${f.Mail}</p>
                <p>${f.Research}</p>
              </div>
            </div>
          </div>`;
        });

        $("#guestFacultyContainer").html(guestHTML);

        // ================= STAFF =================
        let staffData = XLSX.utils.sheet_to_json(workbook.Sheets["Staff"]);
        let staffHTML = "";

        $.each(staffData, function (i, s) {
          staffHTML += `
          <div class="col">
            <div class="card p-3 bg-info bg-opacity-10 border border-info rounded">
              <img src="${getImageWithFallback(s.Image)}" class="mx-auto border border-3 border-warning w-50" onerror="this.src='images/placeholder.jpg'">
              <h5 class="mt-2">${s.Name}</h5>
              <p>${s.Designation}</p>
              <p>📞 ${s.Mobile}</p>
              <p>✉ ${s.Mail}</p>
            </div>
          </div>`;
        });

        $("#staffContainer").html(staffHTML);

        // ================= PREVIOUS FACULTY =================
        let previousFacultyData = XLSX.utils.sheet_to_json(
          workbook.Sheets["PreviousFaculty"] || {},
        );

        let previousFacultyHTML = "";

        $.each(previousFacultyData, function (i, p) {
          previousFacultyHTML += `
    <div class="col">
      <div class="card p-3 bg-info bg-opacity-10 border border-info rounded">
        <div class="image-container mx-auto">
          <img src="${getImageWithFallback(p.Images)}" width="150" height="175" onerror="this.src='images/placeholder.jpg'">
          <div class="hover-text">${p.Area}</div>
        </div>

        <h5 class="mt-2">${p.Name}</h5>

        ${p.From ? `<p class="mb-1"><strong>From:</strong> ${p.From}</p>` : ""}

        ${p.To ? `<p class="mb-0"><strong>To:</strong> ${p.To}</p>` : ""}
      </div>
    </div>
  `;
        });

        $("#previousFacultyContainer").html(previousFacultyHTML);

        // ================= PREVIOUS HOD =================
        let previousHODData = XLSX.utils.sheet_to_json(
          workbook.Sheets["PreviousHOD"] || {},
        );

        let previousHODHTML = "";

        $.each(previousHODData, function (i, p) {
          previousHODHTML += `
    <div class="col">
      <div class="card p-3 bg-info bg-opacity-10 border border-info rounded">
        <div class="image-container mx-auto">
          <img src="${getImageWithFallback(p.Image)}" width="150" height="175" onerror="this.src='images/placeholder.jpg'">
          <div class="hover-text">${p.Area}</div>
        </div>

        <h5 class="mt-2">${p.Name}</h5>

        ${p.From ? `<p class="mb-1"><strong>From:</strong> ${p.From}</p>` : ""}

        ${p.To ? `<p class="mb-0"><strong>To:</strong> ${p.To}</p>` : ""}
      </div>
    </div>
  `;
        });

        $("#previousHODContainer").html(previousHODHTML);
      },
      error: function (err) {
        console.error("Excel load error:", err);
      },
    });
  });
</script>
