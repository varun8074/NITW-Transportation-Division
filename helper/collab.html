<style>

.project-card{
    cursor:pointer;
    transition:.3s;
    height:100%;
}

.project-card:hover{
    transform: translateY(-2px);
    box-shadow:0 4px 8px rgba(248, 170, 2, 0.979);
}

.project-card img{
    height:220px;
    object-fit:cover;
}

.project-title{
    font-size:16px;
    font-weight:600;
    min-height:55px;
}

.detail-row{
    border-bottom:1px solid #eee;
    padding:10px 0;
}

.detail-key{
    font-weight:600;
}

</style>
<!-- ================= MAIN TABS ================= -->
<ul class="nav nav-pills-rounded nav-justified mb-3"
    id="mainTabs"
    role="tablist"
    style="min-width:1000px">

    <li class="nav-item pe-3">
        <button class="nav-link active"
                data-bs-toggle="pill"
                data-bs-target="#academiccollaborationPane">
            Academic Collaborations
        </button>
    </li>

    <li class="nav-item pe-3">
        <button class="nav-link"
                data-bs-toggle="pill"
                data-bs-target="#industrycollaborationPane">
            Industry Collaborations
        </button>
    </li>

</ul>

<div class="tab-content">

    <!-- ================= ACADEMIC ================= -->
    <div class="tab-pane fade show active"
         id="academiccollaborationPane">

        <ul class="nav nav-pills-rounded nav-justified mb-4">

            <li class="nav-item pe-3">
                <button class="nav-link active"
                        data-bs-toggle="pill"
                        data-bs-target="#ongoingacademiccollaborationPane">
                    Ongoing Academic Collaboration
                </button>
            </li>

            <li class="nav-item pe-3">
                <button class="nav-link"
                        data-bs-toggle="pill"
                        data-bs-target="#completedacademiccollaborationPane">
                    Completed Academic Collaboration
                </button>
            </li>

        </ul>

        <div class="tab-content">

            <div class="tab-pane fade show active"
                 id="ongoingacademiccollaborationPane">

                <div class="row g-4"
                     id="academicOngoingContainer"></div>

            </div>

            <div class="tab-pane fade"
                 id="completedacademiccollaborationPane">

                <div class="row g-4"
                     id="academicCompletedContainer"></div>

            </div>

        </div>
    </div>

    <!-- ================= INDUSTRY ================= -->
    <div class="tab-pane fade"
         id="industrycollaborationPane">

        <ul class="nav nav-pills-rounded nav-justified mb-4">

            <li class="nav-item pe-3">
                <button class="nav-link active"
                        data-bs-toggle="pill"
                        data-bs-target="#ongoingIndustrycollaborationPane">
                    Ongoing Industry Collaboration
                </button>
            </li>

            <li class="nav-item pe-3">
                <button class="nav-link"
                        data-bs-toggle="pill"
                        data-bs-target="#completedIndustrycollaborationPane">
                    Completed Industry Collaboration
                </button>
            </li>

        </ul>

        <div class="tab-content">

            <div class="tab-pane fade show active"
                 id="ongoingIndustrycollaborationPane">

                <div class="row g-4"
                     id="industryOngoingContainer"></div>

            </div>

            <div class="tab-pane fade"
                 id="completedIndustrycollaborationPane">

                <div class="row g-4"
                     id="industryCompletedContainer"></div>

            </div>

        </div>

    </div>

</div>

<!-- ================= MODAL ================= -->

<div class="modal fade"
     id="projectModal"
     tabindex="-1">

    <div class="modal-dialog modal-lg modal-dialog-scrollable">

        <div class="modal-content">

            <div class="modal-header">
                <h5 class="modal-title"
                    id="modalTitle"></h5>

                <button type="button"
                        class="btn-close"
                        data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body"
                 id="modalBody"></div>

        </div>

    </div>

</div>



<script>

$(document).ready(function(){

    const DUMMY_IMAGE = "images/placeholder.jpg";

    function createCard(row,type){

        let imagePath = row.Image || DUMMY_IMAGE;

        let subtitle =
            type === "academic"
            ? (row.Partner_Institute || "")
            : (row.Company_Name || "");

        return `
            <div class="col-lg-4 col-md-6">

                <div class="card project-card"
                     onclick='showDetails(${JSON.stringify(row)})'>

                    <img src="${imagePath}"
                         class="card-img-top"
                         onerror="this.src='${DUMMY_IMAGE}'">

                    <div class="card-body">

                        <div class="project-title">
                            ${row.Project_Title || "-"}
                        </div>

                        <small class="text-muted">
                            ${subtitle}
                        </small>

                    </div>

                </div>

            </div>
        `;
    }

    window.showDetails = function(row){

        $("#modalTitle").html(row.Project_Title);

        let html = "";

        Object.keys(row).forEach(key=>{

            if(key !== "Image"){

                html += `
                    <div class="row detail-row">

                        <div class="col-md-4 detail-key">
                            ${key.replaceAll("_"," ")}
                        </div>

                        <div class="col-md-8">
                            ${row[key] || "-"}
                        </div>

                    </div>
                `;
            }

        });

        $("#modalBody").html(html);

        let modal =
            new bootstrap.Modal(
                document.getElementById("projectModal")
            );

        modal.show();
    };

    fetch("excels/collaboration_data.xlsx")
        .then(response => response.arrayBuffer())
        .then(data => {

            const workbook =
                XLSX.read(data,{type:"array"});

            /* ================= ACADEMIC ================= */

            const academicData =
                XLSX.utils.sheet_to_json(
                    workbook.Sheets["Academic Collaboration"]
                );

            academicData.forEach(row=>{

                let card =
                    createCard(row,"academic");

                if(row.Status === "Ongoing"){

                    $("#academicOngoingContainer")
                        .append(card);

                }else{

                    $("#academicCompletedContainer")
                        .append(card);

                }

            });

            /* ================= INDUSTRY ================= */

            const industryData =
                XLSX.utils.sheet_to_json(
                    workbook.Sheets["Industry Collaboration"]
                );

            industryData.forEach(row=>{

                let card =
                    createCard(row,"industry");

                if(row.Status === "Ongoing"){

                    $("#industryOngoingContainer")
                        .append(card);

                }else{

                    $("#industryCompletedContainer")
                        .append(card);

                }

            });

        })
        .catch(error => {
            console.error(error);
        });

});

</script>
