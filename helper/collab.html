 <script>
$(document).ready(function () {

  function loadExcel() {
    fetch("excels\\collaboration_data.xlsx")
      .then(res => res.arrayBuffer())
      .then(data => {
        const workbook = XLSX.read(data, { type: "array" });

        // ================= ACADEMIC =================
        let academicData = XLSX.utils.sheet_to_json(
          workbook.Sheets["Academic Collaboration"]
        );

        let academicOngoing = [];
        let academicCompleted = [];

        academicData.forEach(row => {
          let rowData = [
            row.Project_Title,
            row.Partner_Institute,
            row.Principal_Investigator,
            row.Start_Date,
            row.End_Date || "-",
            row.Funding_Agency,
            row["Funding_Amount (INR)"]
          ];

          if (row.Status === "Ongoing") {
            academicOngoing.push(rowData);
          } else {
            academicCompleted.push(rowData);
          }
        });

        // Academic Tables
        $('#academicOngoingTable').DataTable({
          data: academicOngoing,
          columns: getAcademicColumns()
        });

        $('#academicCompletedTable').DataTable({
          data: academicCompleted,
          columns: getAcademicColumns()
        });

        // ================= INDUSTRY =================
        let industryData = XLSX.utils.sheet_to_json(
          workbook.Sheets["Industry Collaboration"]
        );

        let industryOngoing = [];
        let industryCompleted = [];

        industryData.forEach(row => {
          let rowData = [
            row.Project_Title,
            row.Company_Name,
            row.Project_Manager,
            row.Start_Date,
            row.End_Date || "-",
            row.Project_Type,
            row["Project_Value (INR)"]
          ];

          if (row.Status === "Ongoing") {
            industryOngoing.push(rowData);
          } else {
            industryCompleted.push(rowData);
          }
        });

        // Industry Tables
        $('#industryOngoingTable').DataTable({
          data: industryOngoing,
          columns: getIndustryColumns()
        });

        $('#industryCompletedTable').DataTable({
          data: industryCompleted,
          columns: getIndustryColumns()
        });

      });
  }

  function getAcademicColumns() {
    return [
      { title: "Project Title" },
      { title: "Partner Institute" },
      { title: "Principal Investigator" },
      { title: "Start Date" },
      { title: "End Date" },
      { title: "Funding Agency" },
      { title: "Funding Amount (INR)" }
    ];
  }

  function getIndustryColumns() {
    return [
      { title: "Project Title" },
      { title: "Company Name" },
      { title: "Project Manager" },
      { title: "Start Date" },
      { title: "End Date" },
      { title: "Project Type" },
      { title: "Project Value (INR)" }
    ];
  }

  loadExcel();

});
</script>
