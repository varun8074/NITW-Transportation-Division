<style>
  .carousel-container {
    width: 100%;
    height: 500px;
    max-width: 1000px;
    margin: 0 auto;
    overflow: hidden;
    border-radius: 5px;
  }

  .carousel-item img {
    height: 500px;
    object-fit: cover;
    animation: zoomEffect 8s linear infinite;
  }

  @keyframes zoomEffect {
    from {
      transform: scale(1);
    }
    to {
      transform: scale(1.18);
    }
  }
</style>
<div class="container-fluid mt-4">
  <div class="card border-primary shadow-sm">
    <div
      class="card-header bg-primary text-white fw-bold d-flex justify-content-between align-items-center"
    >
      <span>📰 Latest News & Announcements</span>
      <div class="btn-group" role="group" style="gap: 5px">
        <button
          type="button"
          class="btn btn-sm btn-light"
          id="newsFirst"
          title="Go to first news"
        >
          ⏮️ First
        </button>
        <button
          type="button"
          class="btn btn-sm btn-light"
          id="newsPrev"
          title="Previous news"
        >
          ⬆️ Prev
        </button>
        <button
          type="button"
          class="btn btn-sm btn-light"
          id="newsNext"
          title="Next news"
        >
          ⬇️ Next
        </button>
      </div>
    </div>

    <div
      class="card-body p-0"
      style="height: 250px; overflow-y: auto"
      id="newsScroller"
    >
      <ul class="list-group list-group-flush" id="newsContainer"></ul>
    </div>
  </div>
</div>
<div
  id="carouselExampleCaptions"
  class="carousel slide carousel-fade carousel-container pt-4"
  data-bs-ride="carousel"
>
  <div class="carousel-indicators" id="carouselIndicators"></div>

  <div class="carousel-inner" id="carouselInner"></div>

  <button
    class="carousel-control-prev"
    type="button"
    data-bs-target="#carouselExampleCaptions"
    data-bs-slide="prev"
  >
    <span class="carousel-control-prev-icon"></span>
  </button>

  <button
    class="carousel-control-next"
    type="button"
    data-bs-target="#carouselExampleCaptions"
    data-bs-slide="next"
  >
    <span class="carousel-control-next-icon"></span>
  </button>
</div>
<script>
  $(document).ready(function () {
    $.ajax({
      url: "excels/outreach_activity.xlsx",
      method: "GET",
      xhrFields: {
        responseType: "arraybuffer",
      },
      success: function (data) {
        const workbook = XLSX.read(data, {
          type: "array",
        });

        const imageData = XLSX.utils.sheet_to_json(
          workbook.Sheets["faculty_papers_Images"],
        );

        let indicators = "";
        let slides = "";

        $.each(imageData, function (index, row) {
          indicators += `
                    <button
                        type="button"
                        data-bs-target="#carouselExampleCaptions"
                        data-bs-slide-to="${index}"
                        class="${index === 0 ? "active" : ""}"
                        ${index === 0 ? 'aria-current="true"' : ""}
                        aria-label="Slide ${index + 1}">
                    </button>
                `;

          slides += `
                <div class="carousel-item ${index === 0 ? "active" : ""}">
                    <img
                        src="images/outreach_activity/${row.Image_path}"
                        class="d-block w-100"
                        style="height:500px; width: 800px; object-fit:cover;"
                        alt="${row.Title}">

                    <div class="carousel-caption d-none d-md-block">
                        <h5>${row.Title || ""}</h5>
                        <p>${row.Description || ""}</p>
                    </div>
                </div>
                `;
        });

        $("#carouselIndicators").html(indicators);
        $("#carouselInner").html(slides);
        // Initialize carousel after slides are added
        const carouselElement = document.querySelector(
          "#carouselExampleCaptions",
        );

        new bootstrap.Carousel(carouselElement, {
          interval: 3000,
          ride: "carousel",
          pause: false,
          wrap: true,
        });

        // News
        let newsData = XLSX.utils.sheet_to_json(workbook.Sheets["News"] || {});

        let newsHTML = "";

        $.each(newsData, function (i, row) {
          newsHTML += `
    <li class="list-group-item">
      <strong>${row.Date}</strong> - ${row.News}
    </li>
  `;
        });

        $("#newsContainer").html(newsHTML);

        // News Navigation
        const newsScroller = document.getElementById("newsScroller");
        const newsItems = document.querySelectorAll("#newsContainer li");
        const itemHeight = newsItems[0]?.offsetHeight || 60;

        document
          .getElementById("newsFirst")
          .addEventListener("click", function () {
            newsScroller.scrollTop = 0;
          });

        document
          .getElementById("newsPrev")
          .addEventListener("click", function () {
            newsScroller.scrollTop = Math.max(
              0,
              newsScroller.scrollTop - itemHeight,
            );
          });

        document
          .getElementById("newsNext")
          .addEventListener("click", function () {
            newsScroller.scrollTop += itemHeight;
          });
      },
      error: function (err) {
        console.error("Error loading Excel:", err);
      },
    });
  });
</script>
