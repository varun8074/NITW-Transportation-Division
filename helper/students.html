<script>
  $(document).ready(function () {
    let currentPage = 1;
    let rowsPerPage = 5;

    let fullDataRS = [],
      filteredDataRS = [];
    let fullDataMS = [],
      filteredDataMS = [];

    let currentMode = ""; // 'RS' or 'MS'

    // ================= CLICK BATCH =================
    $(document).on("click", ".batch-btn", function () {
      let selectedBatch = $(this).data("batch").toString().trim();

      // Detect based on clicked button (FINAL FIX)
      let isRS = $(this).closest("#aluminirsPane").length > 0;
      currentMode = isRS ? "RS" : "MS";

      let fileUrl = isRS ? "excels/Phd_Alumini.xlsx" : "excels/M-Tech_Alumini.xlsx";

      let outputDiv = isRS ? "#rsOutput" : "#msOutput";

      fetch(fileUrl)
        .then((res) => {
          if (!res.ok) throw new Error("File not found");
          return res.arrayBuffer();
        })
        .then((data) => {
          let workbook = XLSX.read(data, { type: "array" });

          // 🔥 Safe sheet match
          let sheetName = Object.keys(workbook.Sheets).find(
            (name) => name.trim() === selectedBatch,
          );

          let sheet = workbook.Sheets[sheetName];

          if (!sheet) {
            $(outputDiv).html(
              `<p style="color:red;">Sheet ${selectedBatch} not found</p>`,
            );
            return;
          }

          let excelData = XLSX.utils.sheet_to_json(sheet, { defval: "" });

          // 🔥 Clean column names
          excelData = excelData.map((row) => {
            let newRow = {};
            Object.keys(row).forEach((key) => {
              newRow[key.trim()] = row[key];
            });
            return newRow;
          });

          if (isRS) {
            fullDataRS = excelData;
            filteredDataRS = [...fullDataRS];
          } else {
            fullDataMS = excelData;
            filteredDataMS = [...fullDataMS];
          }

          currentPage = 1;
          renderLayout(selectedBatch, outputDiv);
          renderTable(outputDiv);
        })
        .catch(() => {
          $(outputDiv).html(
            "<p style='color:red;'>Error loading Excel file</p>",
          );
        });
    });

    // ================= LAYOUT =================
    function renderLayout(batch, outputDiv) {
      let isRSLayout = outputDiv === "#rsOutput";

      let searchId = isRSLayout ? "searchRS" : "searchMS";
      let tableId = isRSLayout ? "tableRS" : "tableMS";

      let html = `
      <h5 class="mt-3">Batch ${batch}</h5>

      <input type="text" id="${searchId}" class="form-control mb-3" placeholder="Search...">

      <div id="${tableId}"></div>

      <div class="d-flex justify-content-between mt-2">
        <div id="paginationInfo"></div>
        <div id="paginationControls"></div>
      </div>
    `;

      $(outputDiv).html(html);
    }

    // ================= SEARCH =================
    $(document).on("keyup", "#searchRS, #searchMS", function () {
      let value = $(this).val().toLowerCase();

      if ($(this).attr("id") === "searchRS") {
        filteredDataRS = fullDataRS.filter((row) =>
          Object.values(row).some((val) =>
            String(val).toLowerCase().includes(value),
          ),
        );
        currentMode = "RS";
      } else {
        filteredDataMS = fullDataMS.filter((row) =>
          Object.values(row).some((val) =>
            String(val).toLowerCase().includes(value),
          ),
        );
        currentMode = "MS";
      }

      currentPage = 1;
      renderTable(currentMode === "RS" ? "#rsOutput" : "#msOutput");
    });

    // ================= TABLE =================
    function renderTable(outputDiv) {
      let isRS = currentMode === "RS";
      let data = isRS ? filteredDataRS : filteredDataMS;

      let start = (currentPage - 1) * rowsPerPage;
      let pageData = data.slice(start, start + rowsPerPage);

      let html = `<table class="table table-bordered table-striped">`;

      // ===== RS TABLE =====
      if (isRS) {
        html += `
      <thead class="table-dark">
        <tr>
          <th>Year</th>
          <th>Name</th>
          <th>Area</th>
          <th>Supervisor</th>
          <th>Photo</th>
        </tr>
      </thead><tbody>`;

        pageData.forEach((row) => {
          html += `
        <tr>
          <td>${row.Year || "-"}</td>
          <td>${row["Name of the Scholar"] || "-"}</td>
          <td>${row["Area of Research"] || "-"}</td>
          <td>${row["Supervisor(s)"] || "-"}</td>
          <td>
            ${
              row.Photo
                ? `<img src="images/${row.Photo}.jpg" width="60" height="80">`
                : "No Image"
            }
          </td>
        </tr>`;
        });
      } else {
        // ===== M.TECH TABLE =====
        html += `
      <thead class="table-dark">
        <tr>
          <th>Batch</th>
          <th>Roll Number</th>
          <th>Name</th>
          <th>M.Tech Thesis Title</th>
          <th>Thesis Abstract</th>
          <th>Seminar Title</th>
          <th>Industry Training</th>
          <th>Current Position</th>
          <th>Photo</th>
        </tr>
      </thead><tbody>`;

        pageData.forEach((student) => {
          html += `
        <tr>
          <td>${student.Batch || "-"}</td>
          <td>${student["Roll Number"] || "-"}</td>
          <td>${student.Name || "-"}</td>
          <td>${student["M.Tech Thesis Title"] || "-"}</td>
          <td>${student["Thesis Abstract"] || "-"}</td>
          <td>${student["Seminar Title"] || "-"}</td>
          <td>${student["Industry Training"] || "-"}</td>
          <td>${student["Current Position"] || "-"}</td>
          <td>
            ${
              student.Photo
                ? `<img src="images/${student.Photo}.jpg" width="60" height="80">`
                : "No Image"
            }
          </td>
        </tr>`;
        });
      }

      if (pageData.length === 0) {
        html += `<tr><td colspan="9" class="text-center">No data found</td></tr>`;
      }

      html += `</tbody></table>`;

      let tableId = isRS ? "#tableRS" : "#tableMS";
      $(tableId).html(html);

      renderPagination(data);
    }

    // ================= PAGINATION =================
    function renderPagination(data) {
      let totalPages = Math.ceil(data.length / rowsPerPage);

      let controls = "";

      controls += `<button class="btn btn-sm btn-secondary me-1" ${
        currentPage === 1 ? "disabled" : ""
      } onclick="changePage(${currentPage - 1})">Prev</button>`;

      for (let i = 1; i <= totalPages; i++) {
        controls += `
      <button class="btn btn-sm ${
        i === currentPage ? "btn-primary" : "btn-outline-primary"
      } me-1"
      onclick="changePage(${i})">${i}</button>`;
      }

      controls += `<button class="btn btn-sm btn-secondary" ${
        currentPage === totalPages ? "disabled" : ""
      } onclick="changePage(${currentPage + 1})">Next</button>`;

      $("#paginationControls").html(controls);

      $("#paginationInfo").html(
        `Showing ${
          data.length === 0 ? 0 : (currentPage - 1) * rowsPerPage + 1
        } to ${Math.min(currentPage * rowsPerPage, data.length)} of ${
          data.length
        } entries`,
      );
    }

    // ================= PAGE CHANGE =================
    window.changePage = function (page) {
      currentPage = page;
      renderTable(currentMode === "RS" ? "#rsOutput" : "#msOutput");
    };
  });
</script>
