<script>
$(document).ready(function () {

  let state = {
    RS: { full: [], filtered: [], page: 1 },
    MS: { full: [], filtered: [], page: 1 }
  };

  let rowsPerPage = 5;
  let currentMode = ""; // RS or MS

  // ================= CLICK BATCH =================
  $(document).on("click", ".batch-btn", function () {

    let batch = $(this).data("batch").toString().trim();
    let isRS = $(this).closest("#aluminirsPane").length > 0;

    currentMode = isRS ? "RS" : "MS";

    let fileUrl = isRS 
      ? "excels/Phd_Alumini.xlsx" 
      : "excels/M-Tech_Alumini.xlsx";

    let outputDiv = isRS ? "#rsOutput" : "#msOutput";

    fetch(fileUrl)
      .then(res => {
        if (!res.ok) throw new Error();
        return res.arrayBuffer();
      })
      .then(data => {

        let wb = XLSX.read(data, { type: "array" });

        let sheetName = Object.keys(wb.Sheets)
          .find(name => name.trim() === batch);

        if (!sheetName) {
          $(outputDiv).html(`<p class="text-danger">Sheet ${batch} not found</p>`);
          return;
        }

        let sheet = wb.Sheets[sheetName];
        let json = XLSX.utils.sheet_to_json(sheet, { defval: "" });

        // Clean keys
        json = json.map(row => {
          let obj = {};
          Object.keys(row).forEach(k => obj[k.trim()] = row[k]);
          return obj;
        });

        state[currentMode].full = json;
        state[currentMode].filtered = [...json];
        state[currentMode].page = 1;

        renderLayout(batch, outputDiv, currentMode);
        renderTable();

      })
      .catch(() => {
        $(outputDiv).html(`<p class="text-danger">Error loading file</p>`);
      });
  });

  // ================= LAYOUT =================
  function renderLayout(batch, outputDiv, mode) {

    let html = `
      <h5 class="mt-3">Batch ${batch}</h5>

      <input type="text" 
             id="search_${mode}" 
             class="form-control mb-3" 
             placeholder="Search...">

      <div id="table_${mode}"></div>

      <div class="d-flex justify-content-between mt-2">
        <div id="info_${mode}"></div>
        <div id="pagination_${mode}"></div>
      </div>
    `;

    $(outputDiv).html(html);
  }

  // ================= SEARCH =================
  $(document).on("keyup", "#search_RS, #search_MS", function () {

    let mode = this.id.split("_")[1];
    let value = $(this).val().toLowerCase();

    state[mode].filtered = state[mode].full.filter(row =>
      Object.values(row).some(val =>
        String(val).toLowerCase().includes(value)
      )
    );

    state[mode].page = 1;
    currentMode = mode;

    renderTable();
  });

  // ================= TABLE =================
  function renderTable() {

    let data = state[currentMode].filtered;
    let page = state[currentMode].page;

    let start = (page - 1) * rowsPerPage;
    let pageData = data.slice(start, start + rowsPerPage);

    let html = `<table class="table table-bordered table-striped">`;

    // ===== RS TABLE =====
    if (currentMode === "RS") {

      html += `
        <thead class="table-dark">
          <tr>
            <th>Year</th>
            <th>Name</th>
            <th>Area</th>
            <th>Supervisor</th>
            <th>Photo</th>
          </tr>
        </thead><tbody>`;

      pageData.forEach(row => {
        html += `
          <tr>
            <td>${row.Year || "-"}</td>
            <td>${row["Name of the Scholar"] || "-"}</td>
            <td>${row["Area of Research"] || "-"}</td>
            <td>${row["Supervisor(s)"] || "-"}</td>
            <td>
              ${row.Photo 
                ? `<img src="images/${row.Photo}.jpg" width="60" height="80">`
                : "No Image"}
            </td>
          </tr>`;
      });

    } else {

      html += `
        <thead class="table-dark">
          <tr>
            <th>Batch</th>
            <th>Roll</th>
            <th>Name</th>
            <th>Thesis</th>
            <th>Abstract</th>
            <th>Seminar</th>
            <th>Training</th>
            <th>Position</th>
            <th>Photo</th>
          </tr>
        </thead><tbody>`;

      pageData.forEach(s => {
        html += `
          <tr>
            <td>${s.Batch || "-"}</td>
            <td>${s["Roll Number"] || "-"}</td>
            <td>${s.Name || "-"}</td>
            <td>${s["M.Tech Thesis Title"] || "-"}</td>
            <td>${s["Thesis Abstract"] || "-"}</td>
            <td>${s["Seminar Title"] || "-"}</td>
            <td>${s["Industry Training"] || "-"}</td>
            <td>${s["Current Position"] || "-"}</td>
            <td>
              ${s.Photo 
                ? `<img src="images/${s.Photo}.jpg" width="60" height="80">`
                : "No Image"}
            </td>
          </tr>`;
      });
    }

    if (pageData.length === 0) {
      html += `<tr><td colspan="9" class="text-center">No data found</td></tr>`;
    }

    html += `</tbody></table>`;

    $(`#table_${currentMode}`).html(html);

    renderPagination(data);
  }

  // ================= PAGINATION =================
  function renderPagination(data) {

    let totalPages = Math.ceil(data.length / rowsPerPage);
    let page = state[currentMode].page;

    if (totalPages === 0) {
      $(`#pagination_${currentMode}`).html("");
      $(`#info_${currentMode}`).html("No entries");
      return;
    }

    let startPage = Math.max(1, page - 2);
    let endPage = Math.min(totalPages, page + 2);

    let buttons = `
      <button class="btn btn-sm btn-secondary page-btn" 
              data-page="${page - 1}" 
              ${page === 1 ? "disabled" : ""}>Prev</button>
    `;

    for (let i = startPage; i <= endPage; i++) {
      buttons += `
        <button class="btn btn-sm ${i === page ? "btn-primary" : "btn-outline-primary"} page-btn"
                data-page="${i}">
          ${i}
        </button>`;
    }

    buttons += `
      <button class="btn btn-sm btn-secondary page-btn" 
              data-page="${page + 1}" 
              ${page === totalPages ? "disabled" : ""}>Next</button>
    `;

    $(`#pagination_${currentMode}`).html(buttons);

    let start = (page - 1) * rowsPerPage + 1;
    let end = Math.min(page * rowsPerPage, data.length);

    $(`#info_${currentMode}`).html(
      `Showing ${data.length === 0 ? 0 : start} to ${end} of ${data.length}`
    );
  }

  // ================= PAGE CLICK =================
  $(document).on("click", ".page-btn", function () {
    let page = Number($(this).data("page"));
    state[currentMode].page = page;
    renderTable();
  });

});
</script>
