<script>
  $(document).ready(function () {
    let rowsPerPage = 8;

    // ================= STATE =================
    let state = {
      CRS: {},
      RS: {},
      CMS: {},
      MS: {},
    };

    // ================= AUTO LOAD =================
    loadExcel("excels/Phd_Current.xlsx", "CRS", "#crsOutput");

    // ================= BATCH BUTTON CLICK =================
    $(document).on("click", ".batch-btn", function () {
      let batch = $(this).data("batch").toString().trim();

      if ($(this).closest("#aluminirsPane").length) {
        loadExcel("excels/Phd_Alumini.xlsx", "RS", "#rsOutput", batch);
      } else if ($(this).closest("#currentmPane").length) {
        loadExcel("excels/Current_Mtech.xlsx", "CMS", "#cmsOutput", batch);
      } else {
        loadExcel("excels/M-Tech_Alumini.xlsx", "MS", "#msOutput", batch);
      }
    });

    // ================= IMAGE PATH =================
    function getImagePath(photoValue) {
      if (!photoValue) return "";

      let val = photoValue.toString().trim();

      // DIRECT URL
      if (val.startsWith("http")) return val;

      // LOCAL IMAGE
      return "images/" + val + ".jpg";
    }

    // ================= LOAD EXCEL =================
    function loadExcel(fileUrl, mode, outputDiv, batch = null) {
      fetch(fileUrl)
        .then((res) => res.arrayBuffer())
        .then((data) => {
          let workbook = XLSX.read(data, { type: "array" });

          let sheetName = batch
            ? Object.keys(workbook.Sheets).find((n) => n.trim() === batch)
            : workbook.SheetNames[0];

          let sheet = workbook.Sheets[sheetName];

          let excelData = XLSX.utils.sheet_to_json(sheet, {
            defval: "",
          });

          // CLEAN COLUMN NAMES
          excelData = excelData.map((row) => {
            let newRow = {};

            Object.keys(row).forEach((k) => {
              newRow[k.trim()] = row[k];
            });

            return newRow;
          });

          // SAVE STATE
          state[mode] = {
            fullData: excelData,
            filteredData: [...excelData],
            currentPage: 1,
            outputDiv: outputDiv,
            batch: batch,
          };

          renderLayout(mode);
          renderData(mode);
        });
    }

    // ================= RENDER LAYOUT =================
    function renderLayout(mode) {
      let data = state[mode];

      let html = `
        ${data.batch ? `<h5>Batch ${data.batch}</h5>` : ""}

        <input
          type="text"
          id="search${mode}"
          class="form-control mb-3"
          placeholder="Search..."
        >

        <div id="content${mode}"></div>

        <div class="d-flex justify-content-between mt-3">
          <div id="info${mode}"></div>
          <div id="pagination${mode}"></div>
        </div>
      `;

      $(data.outputDiv).html(html);
    }

    // ================= SEARCH =================
    $(document).on("keyup", "[id^=search]", function () {
      let mode = this.id.replace("search", "");

      let val = $(this).val().toLowerCase();

      state[mode].filteredData = state[mode].fullData.filter((row) =>
        Object.values(row).some((v) => String(v).toLowerCase().includes(val)),
      );

      state[mode].currentPage = 1;

      renderData(mode);
    });

    // ================= RENDER DATA =================
    function renderData(mode) {
      let dataState = state[mode];

      let start = (dataState.currentPage - 1) * rowsPerPage;

      let pageData = dataState.filteredData.slice(start, start + rowsPerPage);

      // ===== CURRENT RESEARCH SCHOLARS =====
      if (mode === "CRS") {
        let html = `<div class="row">`;

        pageData.forEach((s) => {
          let img = getImagePath(s.Photo);

          html += `
            <div class="col-md-3 mb-3">

              <div class="card text-center p-2 shadow-sm">

                <div class="img-hover-box">
                  <img src="${img}">

                  <div class="hover-text">
                    ${s["Research Area"] || "-"}
                  </div>
                </div>

                <h6 class="mt-2">
                  ${s.Name || "-"}
                </h6>

                <small>
                  ${s["Reg No."] || "-"}
                </small>

                <br>

                <small>
                  📞 ${s["Phone Number"] || "-"}
                </small>

                <br>

                <small>
                  ✉ ${
                    s.Email ||
                    s["Email Id"] ||
                    s["Email ID"] ||
                    s["E-mail"] ||
                    "-"
                  }
                </small>

              </div>

            </div>
          `;
        });

        html += `</div>`;

        $("#content" + mode).html(html);
      }

      // ===== TABLE VIEWS =====
      else {
        let html = `
          <div class="table-responsive">

          <table class="table table-bordered table-striped align-middle">

          <thead class="table-dark">

          <tr>
        `;

        Object.keys(pageData[0] || {}).forEach((k) => {
          html += `<th>${k}</th>`;
        });

        html += `
          </tr>
          </thead>
          <tbody>
        `;

        pageData.forEach((row) => {
          html += `<tr>`;

          Object.keys(row).forEach((k) => {
            // IMAGE COLUMN
            if (k.toLowerCase().includes("photo")) {
              let img = getImagePath(row[k]);

              html += `
                <td>
                  ${
                    img
                      ? `<img
                          src="${img}"
                          width="60"
                          height="80"
                          style="object-fit:cover;border-radius:5px;"
                        >`
                      : "No Image"
                  }
                </td>
              `;
            }

            // NORMAL COLUMN
            else {
              html += `<td>${row[k] || "-"}</td>`;
            }
          });

          html += `</tr>`;
        });

        html += `
          </tbody>
          </table>
          </div>
        `;

        $("#content" + mode).html(html);
      }

      renderPagination(mode);
    }

    // ================= PAGINATION =================
    function renderPagination(mode) {
      let dataState = state[mode];

      let totalPages = Math.ceil(dataState.filteredData.length / rowsPerPage);

      let controls = "";

      // PREV
      controls += `
        <button
          class="btn btn-sm btn-outline-primary me-1"
          onclick="changePage('${mode}', ${dataState.currentPage - 1})"
          ${dataState.currentPage === 1 ? "disabled" : ""}
        >
          Prev
        </button>
      `;

      // PAGE NUMBERS
      for (let i = 1; i <= totalPages; i++) {
        controls += `
          <button
            class="btn btn-sm ${
              i === dataState.currentPage
                ? "btn-primary"
                : "btn-outline-primary"
            } me-1"
            onclick="changePage('${mode}', ${i})"
          >
            ${i}
          </button>
        `;
      }

      // NEXT
      controls += `
        <button
          class="btn btn-sm btn-outline-primary"
          onclick="changePage('${mode}', ${dataState.currentPage + 1})"
          ${dataState.currentPage === totalPages ? "disabled" : ""}
        >
          Next
        </button>
      `;

      $("#pagination" + mode).html(controls);

      $("#info" + mode).html(`
        Showing
        ${(dataState.currentPage - 1) * rowsPerPage + 1}

        to

        ${Math.min(
          dataState.currentPage * rowsPerPage,
          dataState.filteredData.length,
        )}

        of

        ${dataState.filteredData.length}
      `);
    }

    // ================= PAGE CHANGE =================
    window.changePage = function (mode, page) {
      let totalPages = Math.ceil(state[mode].filteredData.length / rowsPerPage);

      if (page < 1 || page > totalPages) return;

      state[mode].currentPage = page;

      renderData(mode);
    };
  });
</script>
