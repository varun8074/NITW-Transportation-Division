<style>
  .img-hover-box {
    position: relative;

    height: 150px;

  }

    width: 100%;
    height: 100%;

  }

  .hover-text {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    color: #fff;
    font-size: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    opacity: 0;
    transition: 0.3s;
    padding: 5px;
  }

  .img-hover-box:hover .hover-text {
    opacity: 1;
  }
</style>

<script>
  $(document).ready(function () {
    let currentPage = 1;
    let rowsPerPage = 8;

    let fullData = [];
    let filteredData = [];
    let currentMode = ''; // CRS / RS / CMS / MS
    let currentOutput = '';

    // ================= AUTO LOAD CURRENT RS =================
    loadExcel('excels/Phd_Current.xlsx', 'CRS', '#crsOutput');

    // ================= CLICK BATCH =================
    $(document).on('click', '.batch-btn', function () {
      let batch = $(this).data('batch').toString().trim();

      if ($(this).closest('#aluminirsPane').length) {
        loadExcel('excels/Phd_Alumini.xlsx', 'RS', '#rsOutput', batch);
      } else if ($(this).closest('#currentmPane').length) {
        loadExcel('excels/Current_Mtech.xlsx', 'CMS', '#cmsOutput', batch);
      } else {
        loadExcel('excels/M-Tech_Alumini.xlsx', 'MS', '#msOutput', batch);
      }
    });

    function getImagePath(photoValue) {
      if (!photoValue) return '';

      let val = photoValue.toString().trim();

      // GOOGLE DRIVE LINK
      if (val.includes('drive.google.com')) {
        let match = val.match(/[-\w]{25,}/);
        if (match) {
          return `https://lh3.googleusercontent.com/d/${match[0]}`;
        }
      }

      // DIRECT ID (if you store only ID in Excel)
      if (val.length > 20 && !val.startsWith('http')) {
        return `https://lh3.googleusercontent.com/d/${val}`;
      }

      // NORMAL URL
      if (val.startsWith('http')) return val;

      // LOCAL IMAGE
      return 'images/' + val + '.jpg';
    }
    // ================= LOAD EXCEL =================
    function loadExcel(fileUrl, mode, outputDiv, batch = null) {
      currentMode = mode;
      currentOutput = outputDiv;

      fetch(fileUrl)
        .then((res) => res.arrayBuffer())
        .then((data) => {
          let workbook = XLSX.read(data, { type: 'array' });

          let sheetName = batch
            ? Object.keys(workbook.Sheets).find((n) => n.trim() === batch)
            : workbook.SheetNames[0];

          let sheet = workbook.Sheets[sheetName];

          let excelData = XLSX.utils.sheet_to_json(sheet, { defval: '' });

          // clean keys
          excelData = excelData.map((row) => {
            let newRow = {};
            Object.keys(row).forEach((k) => (newRow[k.trim()] = row[k]));
            return newRow;
          });

          fullData = excelData;
          filteredData = [...fullData];
          currentPage = 1;

          renderLayout(batch);
          renderData();
        });
    }

    // ================= LAYOUT =================
    function renderLayout(batch) {
      let prefix = currentMode;

      let html = `
        ${batch ? `<h5>Batch ${batch}</h5>` : ''}
        <input type="text" id="search${prefix}" class="form-control mb-3" placeholder="Search...">
        <div id="content${prefix}"></div>
        <div class="d-flex justify-content-between mt-2">
          <div id="info${prefix}"></div>
          <div id="pagination${prefix}"></div>
        </div>
      `;

      $(currentOutput).html(html);
    }

    // ================= SEARCH =================
    $(document).on('keyup', '[id^=search]', function () {
      let val = $(this).val().toLowerCase();

      filteredData = fullData.filter((row) =>
        Object.values(row).some((v) => String(v).toLowerCase().includes(val)),
      );

      currentPage = 1;
      renderData();
    });

    // ================= RENDER =================
    function renderData() {
      let start = (currentPage - 1) * rowsPerPage;
      let pageData = filteredData.slice(start, start + rowsPerPage);

      // ===== CURRENT RS (CARDS) =====
      if (currentMode === 'CRS') {
        let html = `<div class="row">`;

        pageData.forEach((s) => {
          let img = getImagePath(s.Photo);

          html += `
            <div class="col-md-3 mb-3">
              <div class="card text-center p-2">

                <div class="img-hover-box">
                  <img src="${img}">
                  <div class="hover-text">
                    ${s['Research Area'] || '-'}
                  </div>
                </div>

                <h6>${s.Name || '-'}</h6>
                <small>${s['Reg No.'] || '-'}</small><br>
                <small>📞 ${s['Phone Number'] || '-'}</small><br>
                <small>✉ ${
                  s.Email ||
                  s['Email Id'] ||
                  s['Email ID'] ||
                  s['E-mail'] ||
                  '-'
                }</small>

              </div>
            </div>
          `;
        });

        html += `</div>`;
        $('#contentCRS').html(html);
      }

      // ===== TABLE MODES =====
      else {
        let html = `<table class="table table-bordered table-striped"><thead class="table-dark"><tr>`;

        Object.keys(pageData[0] || {}).forEach((k) => {
          html += `<th>${k}</th>`;
        });

        html += `</tr></thead><tbody>`;

        pageData.forEach((row) => {
          html += `<tr>`;

          Object.keys(row).forEach((k) => {
            if (k.toLowerCase().includes('photo')) {
              let img = getImagePath(row[k]);

              html += `<td>${
                img
                  ? `<img src="${img}" width="60" height="100" style="object-fit:cover;">`
                  : 'No Image'
              }</td>`;
            } else {
              html += `<td>${row[k] || '-'}</td>`;
            }
          });

          html += `</tr>`;
        });

        html += `</tbody></table>`;

        $('#content' + currentMode).html(html);
      }

      renderPagination();
    }

    // ================= PAGINATION =================
    function renderPagination() {
      let totalPages = Math.ceil(filteredData.length / rowsPerPage);
      let prefix = currentMode;

      let controls = '';

      controls += `<button onclick="changePage(${currentPage - 1})"
        ${currentPage === 1 ? 'disabled' : ''}>Prev</button>`;

      for (let i = 1; i <= totalPages; i++) {
        controls += `<button onclick="changePage(${i})"
          ${i === currentPage ? "style='font-weight:bold'" : ''}>
          ${i}
        </button>`;
      }

      controls += `<button onclick="changePage(${currentPage + 1})"
        ${currentPage === totalPages ? 'disabled' : ''}>Next</button>`;

      $('#pagination' + prefix).html(controls);

      $('#info' + prefix).html(
        `Showing ${(currentPage - 1) * rowsPerPage + 1}
         to ${Math.min(currentPage * rowsPerPage, filteredData.length)}
         of ${filteredData.length}`,
      );
    }

    // ================= PAGE CHANGE =================
    window.changePage = function (p) {
      currentPage = p;
      renderData();
    };
  });
</script>
