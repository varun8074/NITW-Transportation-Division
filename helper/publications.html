<!-- ================= STYLES ================= -->
<style>
.timeline {
  position: relative;
  margin-left: 30px;
  padding-left: 30px;
}

.timeline::before {
  content: "";
  position: absolute;
  left: 8px;
  top: 0;
  bottom: 0;
  width: 3px;
  background: #c20315;
}

.timeline-year {
  position: relative;
  margin-bottom: 25px;
}

.timeline-year::before {
  content: "";
  position: absolute;
  left: -29px;
  top: 8px;
  width: 16px;
  height: 16px;
  background: #fff;
  border: 4px solid #c20315;
  border-radius: 50%;
  z-index: 1;
}

.year-title {
  font-size: 20px;
  font-weight: 700;
  color: #c20315;
  margin-bottom: 10px;
}

.publication-item {
  background: #f5f5f5;
  padding: 10px 15px;
  margin-bottom: 8px;
  border-radius: 5px;
  border-left: 4px solid #00b6e2;
  transition: all 0.3s ease;
}

.publication-item:hover {
  transform: translateX(5px);
  background: #ececec;
}
</style>

<!-- ================= TABS ================= -->
<ul
  class="nav nav-pills-rounded nav-justified mb-3"
  id="pills-tab"
  role="tablist"
  style="min-width:1000px"
>
  <li class="nav-item pe-3">
    <button
      class="nav-link active"
      id="pills-journals-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-journals"
      type="button"
    >
      Journals
    </button>
  </li>

  <li class="nav-item pe-3">
    <button
      class="nav-link"
      id="pills-conference-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-conference"
      type="button"
    >
      Conference
    </button>
  </li>
</ul>

<!-- Tab Content -->
<div class="tab-content">
  <div class="tab-pane fade show active" id="pills-journals">
    <div id="journalsContainer"></div>
  </div>

  <div class="tab-pane fade" id="pills-conference">
    <div id="conferenceContainer"></div>
  </div>
</div>
<script>
$(document).ready(function () {
    const excelFile = "excels/Publications.xlsx";

    fetch(excelFile)
        .then(response => response.arrayBuffer())
        .then(data => {

            const workbook = XLSX.read(data, { type: "array" });

            loadTimeline(
                workbook.Sheets["Journals"],
                "#journalsContainer"
            );

            loadTimeline(
                workbook.Sheets["Conference"],
                "#conferenceContainer"
            );
        });

    function loadTimeline(sheet, container) {

    const data = XLSX.utils.sheet_to_json(sheet);

    const grouped = {};

    data.forEach(item => {

        let title = (item.Title || "").trim();

        // Extract last 4 characters as year
        let year = title.slice(-4);

        // Check if extracted value is a valid year
        if (!/^\d{4}$/.test(year)) {
            year = "Others";
        } else {
            // Remove year from title
            title = title.slice(0, -4).trim();

            // Remove trailing commas, dots, hyphens
            title = title.replace(/[,\.\-\s]+$/, "");
        }

        if (!grouped[year]) {
            grouped[year] = [];
        }

        grouped[year].push(title);
    });

    let html = '<div class="timeline">';

    Object.keys(grouped)
        .sort((a, b) => b.localeCompare(a))
        .forEach(year => {

            html += `
                <div class="timeline-year">
                    <div class="year-title">${year}</div>
            `;

            grouped[year].forEach(title => {
                html += `
                    <div class="publication-item">
                        ${title}
                    </div>
                `;
            });

            html += `</div>`;
        });

    html += '</div>';

    $(container).html(html);
}
});
</script>
