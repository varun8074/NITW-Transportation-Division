<!-- ================= STYLES ================= -->
<style>
  .nav-link {
    background-color: #00b6e2;
    color: rgb(0, 0, 0);
    position: relative;
  }

  .nav-link.active {
    background-color: #c20315 !important;
    color: white !important;
    position: relative;
  }

  .publication-card {
    max-width: 60rem;
  }
</style>

<!-- ================= TABS ================= -->
<ul
  class="nav nav-pills-rounded nav-justified mb-3"
  id="pills-tab"
  role="tablist"
  style="min-width: 1000px"
>
  <li class="nav-item pe-3" role="presentation">
    <button
      class="nav-link active"
      id="pills-Journals-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-Journals"
      type="button"
      role="tab"
    >
      Journals
    </button>
  </li>

  <li class="nav-item pe-3" role="presentation">
    <button
      class="nav-link"
      id="pills-conference-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-conference"
      type="button"
      role="tab"
    >
      Conference
    </button>
  </li>
</ul>

<!-- ================= TAB CONTENT ================= -->
<div class="tab-content" id="pills-tabContent">
  <!-- Journals -->
  <div class="tab-pane fade show active" id="pills-Journals" role="tabpanel">
    <div id="journalsContainer"></div>
  </div>

  <!-- Conference -->
  <div class="tab-pane fade" id="pills-conference" role="tabpanel">
    <div id="conferenceContainer"></div>
  </div>
</div>
<script>
  $(document).ready(function () {
    const excelFile = "excels/Publications.xlsx";

    // ================= DYNAMIC RANDOM COLOR =================
    function getRandomColor() {
      // Generate light random colors
      const r = Math.floor(Math.random() * 56) + 200;
      const g = Math.floor(Math.random() * 56) + 200;
      const b = Math.floor(Math.random() * 56) + 200;

      return `rgb(${r}, ${g}, ${b})`;
    }

    fetch(excelFile)
      .then((response) => response.arrayBuffer())
      .then((data) => {
        const workbook = XLSX.read(data, { type: "array" });

        // ================= JOURNALS =================
        const journalSheet = workbook.Sheets["Journals"];
        const journalData = XLSX.utils.sheet_to_json(journalSheet);

        let journalHTML = "";

        journalData.forEach((item) => {
          const bgColor = getRandomColor();

          journalHTML += `
            <div 
              class="card border-secondary mb-3 publication-card"
              style="
                background-color:${bgColor};
                border-radius:12px;
              "
            >
              <div class="card-body">

                <h5 class="card-title">
                  ${item.Title || ""}
                </h5>

                <p>
                  <strong>Authors:</strong>
                  ${item.Authors || ""}
                </p>

                <p>
                  <strong>Journal:</strong>
                  ${item.Journal || ""}
                </p>

                <p>
                  <strong>Volume:</strong> ${item.Volume || ""}
                  ,
                  <strong>Issue:</strong> ${item.Issue || ""}
                  ,
                  <strong>Pages:</strong> ${item.Pages || ""}
                </p>

                <p>
                  <strong>Published Date:</strong>
                  ${formatDate(item["Published Date"])}
                </p>

                <p>
                  <strong>Abstract:</strong>
                  ${item.Abstract || ""}
                </p>

                <p>
                  <strong>Link:</strong>
                  <a href="${item.Link || "#"}" target="_blank">
                    View Publication
                  </a>
                </p>

              </div>
            </div>
          `;
        });

        $("#journalsContainer").html(journalHTML);

        // ================= CONFERENCE =================
        const conferenceSheet = workbook.Sheets["Conference"];
        const conferenceData = XLSX.utils.sheet_to_json(conferenceSheet);

        let conferenceHTML = "";

        conferenceData.forEach((item) => {
          const bgColor = getRandomColor();

          conferenceHTML += `
            <div 
              class="card border-secondary mb-3 publication-card"
              style="
                background-color:${bgColor};
                border-radius:12px;
              "
            >
              <div class="card-body">

                <h5 class="card-title">
                  ${item["Title of Conference Presentation"] || ""}
                </h5>

                <p>
                  <strong>Presenters:</strong>
                  ${item.Presenters || ""}
                </p>

                <p>
                  <strong>Conference Name:</strong>
                  ${item["Conference Name"] || ""}
                </p>

                <p>
                  <strong>Location:</strong>
                  ${item.Location || ""}
                </p>

                <p>
                  <strong>Date:</strong>
                  ${formatDate(item.Date)}
                </p>

                <p>
                  <strong>Abstract:</strong>
                  ${item.Abstract || ""}
                </p>

                <p>
                  <strong>Link/Slides:</strong>
                  <a href="${item["Link/Slides"] || "#"}" target="_blank">
                    View Slides
                  </a>
                </p>

              </div>
            </div>
          `;
        });

        $("#conferenceContainer").html(conferenceHTML);
      });

    // ================= DATE FORMAT FUNCTION =================
    function formatDate(dateValue) {
      if (!dateValue) return "";

      const date = new Date(dateValue);

      if (isNaN(date)) return dateValue;

      return date.toISOString().split("T")[0];
    }
  });
</script>
