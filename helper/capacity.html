<style>
  .nav-link.active {
    background-color: #c20315 !important;
    color: white !important;
    position: relative;
  }
</style>
<ul
  class="nav nav-pills-rounded nav-justified mb-3"
  id="pills-tab"
  role="tablist"
  style="min-width: 1000px"
>
  <li class="nav-item pe-3" role="presentation">
    <button
      class="nav-link active"
      id="pills-continuing_education_programs-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-continuing_education_programs"
      type="button"
      role="tab"
      aria-controls="pills-continuing_education_programs"
      aria-selected="true"
    >
      Continuing Education Programs
    </button>
  </li>
  <li class="nav-item pe-3" role="presentation">
    <button
      class="nav-link"
      id="pills-workshops-tab"
      data-bs-toggle="pill"
      data-bs-target="#pills-workshops"
      type="button"
      role="tab"
      aria-controls="pills-workshops"
      aria-selected="false"
      data-sheet="Workshops"
    >
      Workshops
    </button>
  </li>
</ul>
<div class="tab-content" id="pills-tabContent">
  <div
    class="tab-pane fade show active"
    id="pills-continuing_education_programs"
    role="tabpanel"
    aria-labelledby="pills-continuing_education_programs-tab"
    tabindex="0"
  >
    <div class="accordion" id="accordionExample">
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button
            class="accordion-button"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapseOne"
            aria-expanded="true"
            aria-controls="collapseOne"
            style="background-color: rgba(3, 155, 155, 0.11)"
          >
            Seminars
          </button>
        </h2>
        <div
          id="collapseOne"
          class="accordion-collapse collapse show"
          data-bs-parent="#accordionExample"
        >
          <div class="accordion-body">
            <div id="seminarsOutput"></div>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button
            class="accordion-button collapsed"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapseTwo"
            aria-expanded="false"
            aria-controls="collapseTwo"
            style="background-color: rgba(3, 158, 29, 0.089)"
          >
            Industry Training Programs
          </button>
        </h2>
        <div
          id="collapseTwo"
          class="accordion-collapse collapse"
          data-bs-parent="#accordionExample"
        >
          <div class="accordion-body">
            <div id="industryOutput"></div>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button
            class="accordion-button collapsed"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapseThree"
            aria-expanded="false"
            aria-controls="collapseThree"
            style="background-color: rgba(192, 48, 5, 0.089)"
          >
            Faculty Development Programs
          </button>
        </h2>
        <div
          id="collapseThree"
          class="accordion-collapse collapse"
          data-bs-parent="#accordionExample"
        >
          <div class="accordion-body">
            <div id="facultyOutput"></div>
          </div>
        </div>
      </div>
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button
            class="accordion-button collapsed"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#collapseFour"
            aria-expanded="false"
            aria-controls="collapseFour"
            style="background-color: rgba(192, 189, 5, 0.158)"
          >
            Short Term Training Programs
          </button>
        </h2>
        <div
          id="collapseFour"
          class="accordion-collapse collapse"
          data-bs-parent="#accordionExample"
        >
          <div class="accordion-body">
            <div id="sttpsOutput"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div
    class="tab-pane fade"
    id="pills-workshops"
    role="tabpanel"
    aria-labelledby="pills-workshops-tab"
    tabindex="0"
  >
    <div class="row">
      <div class="col-12">
        <div class="card border-success h-100">
          <div class="card-body">
            <h5 class="text-info">Workshops</h5>
            <div id="wsOutput" class="mt-3"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  $(document).ready(function () {
    // =====================================================
    // LOAD CEP WORKBOOK
    // =====================================================

    fetch("excels/Cep.xlsx")
      .then((res) => res.arrayBuffer())

      .then((data) => {
        const workbook = XLSX.read(data, {
          type: "array",
        });

        // LOAD EACH SHEET
        loadSheetTable(workbook, "Seminars", "#seminarsOutput");

        loadSheetTable(workbook, "Training", "#industryOutput");

        loadSheetTable(
          workbook,
          "FacultyDevelopmentPrograms",
          "#facultyOutput",
        );
        loadSheetTable(workbook, "ShortTermTrainingPrograms", "#sttpsOutput");
      });

    // =====================================================
    // LOAD WORKSHOPS FILE
    // =====================================================

    fetch("excels/Workshops.xlsx")
      .then((res) => res.arrayBuffer())

      .then((data) => {
        const workbook = XLSX.read(data, {
          type: "array",
        });

        const firstSheet = workbook.SheetNames[0];

        loadSheetTable(workbook, firstSheet, "#wsOutput");
      });

    // =====================================================
    // MAIN FUNCTION
    // =====================================================

    function loadSheetTable(workbook, sheetName, outputId) {
      const sheet = workbook.Sheets[sheetName];

      if (!sheet) {
        $(outputId).html(`
        <div class="alert alert-danger">
          Sheet "${sheetName}" not found
        </div>
      `);

        return;
      }

      let fullData = XLSX.utils.sheet_to_json(sheet, {
        defval: "",
      });

      // CLEAN HEADERS
      fullData = fullData.map((row) => {
        let newRow = {};

        Object.keys(row).forEach((k) => {
          newRow[k.trim()] = row[k];
        });

        return newRow;
      });

      let filteredData = [...fullData];

      let currentPage = 1;

      const rowsPerPage = 5;

      renderLayout();

      renderTable();

      // =====================================================
      // LAYOUT
      // =====================================================

      function renderLayout() {
        $(outputId).html(`

        <input
          type="text"
          class="form-control mb-3 searchInput"
          placeholder="Search here..."
        >

        <div class="tableContainer"></div>

        <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">

          <div class="tableInfo"></div>

          <div class="tablePagination"></div>

        </div>

      `);

        // SEARCH EVENT
        $(outputId)
          .find(".searchInput")
          .on("keyup", function () {
            const value = $(this).val().toLowerCase();

            filteredData = fullData.filter((row) =>
              Object.values(row).some((v) =>
                String(v).toLowerCase().includes(value),
              ),
            );

            currentPage = 1;

            renderTable();
          });
      }

      // =====================================================
      // RENDER TABLE
      // =====================================================

      function renderTable() {
        const start = (currentPage - 1) * rowsPerPage;

        const end = start + rowsPerPage;

        const pageData = filteredData.slice(start, end);

        let html = `

        <div class="table-responsive">

          <table class="table table-bordered table-hover">

            <thead class="table-dark text-center">

              <tr>
      `;

        // HEADERS
        if (pageData.length > 0) {
          Object.keys(pageData[0]).forEach((key) => {
            html += `<th>${key}</th>`;
          });
        }

        html += `
              </tr>
            </thead>

            <tbody>
      `;

        // NO DATA
        if (pageData.length === 0) {
          html += `
          <tr>
            <td colspan="20" class="text-center">
              No records found
            </td>
          </tr>
        `;
        }

        // ROWS
        else {
          pageData.forEach((row) => {
            html += `<tr>`;

            Object.values(row).forEach((value) => {
              html += `<td>${value || "-"}</td>`;
            });

            html += `</tr>`;
          });
        }

        html += `
            </tbody>
          </table>
        </div>
      `;

        $(outputId).find(".tableContainer").html(html);

        renderPagination();
      }

      // =====================================================
      // PAGINATION
      // =====================================================

      function renderPagination() {
        let totalPages = Math.ceil(filteredData.length / rowsPerPage);

        let controls = "";

        // PREV
        controls += `
        <button
          class="btn btn-sm btn-secondary me-1 prevBtn"
          ${currentPage === 1 ? "disabled" : ""}
        >
          Prev
        </button>
      `;

        // PAGE NUMBERS
        for (let i = 1; i <= totalPages; i++) {
          controls += `
          <button
            class="btn btn-sm me-1 mb-1 pageBtn
            ${i === currentPage ? "btn-primary" : "btn-outline-primary"}"
            data-page="${i}"
          >
            ${i}
          </button>
        `;
        }

        // NEXT
        controls += `
        <button
          class="btn btn-sm btn-secondary nextBtn"
          ${currentPage === totalPages ? "disabled" : ""}
        >
          Next
        </button>
      `;

        $(outputId).find(".tablePagination").html(controls);

        // INFO
        $(outputId).find(".tableInfo").html(`

        Showing
        ${filteredData.length === 0 ? 0 : startIndex()}
        to
        ${endIndex()}
        of
        ${filteredData.length}
        entries

      `);

        // EVENTS
        $(outputId)
          .find(".pageBtn")
          .on("click", function () {
            currentPage = Number($(this).data("page"));

            renderTable();
          });

        $(outputId)
          .find(".prevBtn")
          .on("click", function () {
            if (currentPage > 1) {
              currentPage--;

              renderTable();
            }
          });

        $(outputId)
          .find(".nextBtn")
          .on("click", function () {
            if (currentPage < totalPages) {
              currentPage++;

              renderTable();
            }
          });
      }

      function startIndex() {
        return (currentPage - 1) * rowsPerPage + 1;
      }

      function endIndex() {
        return Math.min(currentPage * rowsPerPage, filteredData.length);
      }
    }
  });
</script>
